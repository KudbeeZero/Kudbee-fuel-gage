name: KUDBEE Enterprise CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Type Check, Lint, and Build (Monorepo)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Workspace Dependencies
        run: npm ci

      - name: Execute TypeScript Validation
        run: npx turbo run lint

      - name: Compile Production Bundle
        run: npx turbo run build
        env:
          CI: true

      - name: Redis Connectivity Diagnostic
        if: always()
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_TOKEN: ${{ secrets.REDIS_TOKEN }}
          REDIS_DB: ${{ secrets.REDIS_DB }}
          REDIS_TLS: ${{ secrets.REDIS_TLS }}
        run: node scripts/diagnose-redis.mjs

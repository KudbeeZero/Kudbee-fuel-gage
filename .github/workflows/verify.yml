name: Kudbee AI-OS — Full Verification Suite

on:
  push:
    branches: [main, feat/*, fix/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript — 10 Workspaces (0 errors)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci
      - run: npm run typecheck -- --no-cache
      - name: Assert zero type errors
        run: echo "✅ Typecheck 10/10 passed"

  e2e:
    name: E2E Integration — 36 Checks
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: typecheck
    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci
      - run: node scripts/verify-e2e.mjs
        env:
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
      - name: Assert E2E passed
        run: echo "✅ E2E 36/36 passed"

  receptor-gating:
    name: Receptor Gating — 6 Checks
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs: typecheck
    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci
      - run: node scripts/verify-receptor-gating.mjs
        env:
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
      - name: Assert receptor gating passed
        run: echo "✅ Receptor Gating 6/6 passed"

  adversarial:
    name: Adversarial Challenge — 13 Checks
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs: typecheck
    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci
      - run: node scripts/verify-adversarial-challenge.mjs
        env:
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
      - name: Assert adversarial passed
        run: echo "✅ Adversarial 13/13 passed"

  energy-mesh:
    name: Energy Mesh — 4 Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: typecheck
    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci
      - run: node scripts/verify-energy-mesh.mjs
        env:
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
      - name: Assert energy mesh passed
        run: echo "✅ Energy Mesh 4/4 passed"

  chaos:
    name: Middleware Chaos — 6 Checks
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs: typecheck
    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci
      - run: node scripts/verify-middleware-chaos.mjs
        env:
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
      - name: Assert chaos passed
        run: echo "✅ Chaos 6/6 passed"

  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci
      - run: cd apps/web && npm run build
      - name: Assert frontend build passed
        run: echo "✅ Frontend build successful"

  final-report:
    name: System Gate — All Clear
    runs-on: ubuntu-latest
    needs: [typecheck, e2e, receptor-gating, adversarial, energy-mesh, chaos, frontend-build]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Kudbee AI-OS Verification Matrix" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Typecheck (10 workspaces) | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E (36 checks) | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Receptor Gating (6 checks) | ${{ needs.receptor-gating.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Adversarial (13 checks) | ${{ needs.adversarial.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Energy Mesh (4 checks) | ${{ needs.energy-mesh.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Chaos (6 checks) | ${{ needs.chaos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.typecheck.result }}" != "success" ] || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "❌ SYSTEM GATE FAILED — do not merge"
            exit 1
          fi
          echo "✅ ALL GATES PASSED — system verified"
